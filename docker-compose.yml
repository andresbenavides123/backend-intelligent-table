version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: edulive-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
      MONGO_INITDB_DATABASE: edulive_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - edulive-network

  mongo-express:
    image: mongo-express:latest
    container_name: edulive-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin_password
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin_password@mongodb:27017/edulive_db?authSource=admin
    depends_on:
      - mongodb
    networks:
      - edulive-network

volumes:
  mongodb_data:

networks:
  edulive-network:
    driver: bridge
